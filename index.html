<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Checking - By Vinh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- AI LIBRARIES -->
    <script type="module">
        import { AutoModel, AutoImageProcessor, RawImage, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        window.AutoModel = AutoModel; window.AutoImageProcessor = AutoImageProcessor;
        window.RawImage = RawImage; window.env = env;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;500;600;700&display=swap');
        :root { --primary: #007bff; --cyan: #00f2ff; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; color: #1e293b; overflow-x: hidden; }
        .tech-font { font-family: 'Orbitron', sans-serif; }

        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid white; border-radius: 28px; box-shadow: 0 15px 50px rgba(0,0,0,0.04); }
        .camera-viewport { position: relative; overflow: hidden; background: #000; border-radius: 24px; border: 4px solid white; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }

        .laser-scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, transparent, var(--cyan), #fff, var(--cyan), transparent);
            box-shadow: 0 0 20px var(--cyan); animation: moveLaser 3.5s linear infinite; z-index: 20; display: none;
        }
        @keyframes moveLaser { 0% { top: -2%; } 100% { top: 102%; } }

        #holo-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; mix-blend-mode: screen; }

        #object-flare {
            display: none; position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%;
            box-shadow: 0 0 100px 50px white, 0 0 200px 100px var(--cyan);
            z-index: 40; transform: translate(-50%, -50%); animation: flareEffect 0.7s ease-out forwards;
        }
        @keyframes flareEffect { 0% { scale: 0; opacity: 1; } 100% { scale: 12; opacity: 0; } }

        #ai-hud { display: none; position: absolute; inset: 0; z-index: 30; pointer-events: none; }
        .hud-corner { position: absolute; width: 40px; height: 40px; border: 2px solid var(--cyan); filter: drop-shadow(0 0 10px var(--cyan)); opacity: 0.6; }
        
        #lock-timer {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; display: none; z-index: 35;
        }
        #lock-progress { width: 0%; height: 100%; background: var(--cyan); transition: width 2s linear; }

        .btn-premium { background: linear-gradient(135deg, #0062ff, #00d4ff); color: white; transition: 0.4s; border: none; }
        .btn-premium:hover { transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0, 98, 255, 0.4); }

        #image-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(255,255,255,0.96); backdrop-filter: blur(25px); align-items: center; justify-content: center; }
        #zoom-img { transition: transform 0.3s ease; max-width: 85%; max-height: 80%; border-radius: 16px; box-shadow: 0 50px 100px rgba(0,0,0,0.1); }

        .haptic-shake { animation: shake 0.25s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-10 text-center text-center">
        <h1 class="tech-font text-4xl md:text-5xl font-black mb-2 text-slate-900 tracking-tighter italic uppercase">
            Smart <span class="text-blue-600 font-black">AI</span> Checking
        </h1>
        <p class="text-slate-400 tracking-[0.4em] uppercase text-[10px] font-bold">Advanced Inventory System • <span class="text-blue-600">By Vinh</span></p>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 space-y-8">
            <div class="glass-card p-6">
                <div class="flex items-center justify-between mb-6 text-sm">
                    <h2 class="font-black text-slate-800 tech-font uppercase italic text-[11px]"><i class="fas fa-satellite-dish mr-2 text-blue-600"></i> AI RADAR v4.0</h2>
                    <span id="sys-status" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase tracking-widest border border-blue-100 italic">Initializing...</span>
                </div>
                
                <div class="camera-viewport aspect-video flex items-center justify-center" id="cam-container">
                    <div id="laser" class="laser-scanner"></div>
                    <canvas id="holo-canvas"></canvas> 
                    <div id="object-flare"></div>
                    <div id="lock-timer"><div id="lock-progress"></div></div>
                    <div id="ai-hud">
                        <div class="hud-corner top-[20px] left-[20px] border-r-0 border-b-0"></div>
                        <div class="hud-corner top-[20px] right-[20px] border-l-0 border-b-0"></div>
                        <div class="hud-corner bottom-[20px] left-[20px] border-r-0 border-t-0"></div>
                        <div class="hud-corner bottom-[20px] right-[20px] border-l-0 border-t-0"></div>
                        <div id="hud-status" class="absolute bottom-8 left-0 w-full text-cyan-400 text-[9px] tech-font tracking-[0.4em] text-center uppercase">Target Locking...</div>
                    </div>
                    <i id="placeholder" class="fas fa-video text-6xl text-slate-800 opacity-20"></i>
                    <video id="video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline crossorigin="anonymous"></video>
                    <canvas id="canvas" width="224" height="224" class="hidden"></canvas>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="startCamera()" class="btn-premium py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest shadow-lg shadow-blue-200"><i class="fas fa-power-off mr-2 text-sm"></i> Kích hoạt Cam</button>
                    <button id="scan-btn" onclick="runTargetScan()" class="bg-slate-900 text-white py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest hover:bg-black transition shadow-xl"><i class="fas fa-atom mr-2 text-sm"></i> Tìm AI</button>
                </div>
            </div>
            <!-- Module thêm mới giữ nguyên cấu trúc UI của anh -->
            <div class="glass-card p-6 text-sm">
                <h3 class="font-bold text-slate-800 text-xs uppercase tracking-widest mb-4 flex items-center"><i class="fas fa-plus-circle mr-2 text-indigo-500"></i> Register New Item</h3>
                <div class="space-y-4">
                    <input type="text" id="new-id" placeholder="ID (Ví dụ: 8383R)" class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500/20">
                    <input type="text" id="new-code" placeholder="Mã hàng hóa..." class="w-full bg-white border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500/20">
                    <button class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest">Push to database</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 space-y-6">
            <div class="glass-card p-4 flex gap-4 shadow-sm">
                <input type="text" id="filter-code" onkeyup="filterData()" placeholder="Search PN Number..." class="flex-grow bg-transparent p-2 outline-none text-sm font-semibold">
                <input type="text" id="filter-id" onkeyup="filterData()" placeholder="ID..." class="w-24 bg-slate-50 border-none rounded-xl p-2 text-center text-xs font-bold outline-none text-center">
            </div>
            <div class="glass-card p-8">
                <h2 class="font-black text-slate-800 text-sm tech-font mb-6 flex items-center justify-between uppercase italic text-center">
                    AI Results (90-100%) <span id="count-label" class="text-[10px] font-bold bg-blue-600 text-white px-3 py-1.5 rounded-full tracking-widest">0 RECORDS</span>
                </h2>
                <div id="product-list" class="space-y-4 max-h-[550px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="image-modal">
        <div class="absolute top-8 right-8 cursor-pointer w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-full z-[1100] shadow-xl hover:bg-red-500 transition-all" onclick="closeModal()">
            <i class="fas fa-times text-xl"></i>
        </div>
        <div class="relative w-full h-full flex items-center justify-center p-10 overflow-hidden">
            <img id="zoom-img" src="" draggable="false" referrerpolicy="no-referrer">
        </div>
    </div>

    <script type="module">
        const GAS_URL = "DÁN_LINK_GAS_CỦA_ANH_VÀO_ĐÂY";
        let inventoryData = [];
        let model, processor;
        let currentScale = 1; let currentRotation = 0; let isScanning = false;

        async function initAI() {
            const status = document.getElementById('sys-status');
            try {
                window.env.allowLocalModels = false;
                window.env.useBrowserCache = true;
                processor = await window.AutoImageProcessor.from_pretrained('Xenova/dinov2-small');
                model = await window.AutoModel.from_pretrained('Xenova/dinov2-small', { quantized: true });
                status.innerText = "AI ONLINE";
                status.className = "bg-green-50 text-green-600 px-3 py-1 rounded-full font-bold text-[9px] uppercase border border-green-100 italic";
            } catch (e) { status.innerText = "AI ERROR"; }
        }

        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                inventoryData = await response.json();
                renderList(inventoryData);
            } catch (err) { console.error("GAS Loading Error"); }
        }

        window.runTargetScan = async () => {
            if (!model || isScanning) return;
            const video = document.getElementById('video');
            if (video.classList.contains('hidden')) return alert("Hãy mở Cam trước!");

            isScanning = true;
            const holoCanvas = document.getElementById('holo-canvas');
            const ctx = holoCanvas.getContext('2d');
            document.getElementById('ai-hud').style.display = 'block';
            document.getElementById('lock-timer').style.display = 'block';
            const progress = document.getElementById('lock-progress');
            progress.style.width = '0%';
            setTimeout(() => progress.style.width = '100%', 50);

            const startTime = Date.now();
            holoCanvas.width = video.videoWidth; holoCanvas.height = video.videoHeight;

            // Thuật toán Bounding Box (tìm vật thể tối trên nền sáng)
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 100; tempCanvas.height = 75;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(video, 0, 0, 100, 75);
            const pixels = tCtx.getImageData(0, 0, 100, 75).data;
            let minX = 100, maxX = 0, minY = 75, maxY = 0, found = false;
            for (let y = 0; y < 75; y++) {
                for (let x = 0; x < 100; x++) {
                    const i = (y * 100 + x) * 4;
                    const b = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                    if (b < 125) { 
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            const b = found ? { x: minX, y: minY, w: maxX-minX, h: maxY-minY } : { x: 30, y: 25, w: 40, h: 30 };
            const rx = (b.x / 100) * holoCanvas.width;
            const ry = (b.y / 75) * holoCanvas.height;
            const rw = (b.w / 100) * holoCanvas.width;
            const rh = (b.h / 75) * holoCanvas.height;

            function animateWireframe() {
                if (!isScanning || Date.now() - startTime > 2000) return;
                ctx.clearRect(0, 0, holoCanvas.width, holoCanvas.height);
                ctx.save(); ctx.beginPath(); ctx.rect(rx - 15, ry - 15, rw + 30, rh + 30); ctx.clip();
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 1; ctx.globalAlpha = 0.5;
                const step = 20; const shift = (Date.now() / 10) % step;
                for(let i = rx-step; i < rx+rw+step; i+=step) { ctx.moveTo(i+shift, ry); ctx.lineTo(i+shift-10, ry+rh); }
                for(let j = ry-step; j < ry+rh+step; j+=step) { ctx.moveTo(rx, j+shift); ctx.lineTo(rx+rw, j+shift-10); }
                ctx.stroke();
                for(let i=0; i<10; i++) { ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.8; ctx.fillRect(rx + Math.random()*rw, ry + Math.random()*rh, 2.5, 2.5); }
                ctx.restore(); requestAnimationFrame(animateWireframe);
            }
            animateWireframe();

            await new Promise(r => setTimeout(r, 2000));
            isScanning = false;
            const flare = document.getElementById('object-flare');
            flare.style.left = (rx + rw/2) + 'px'; flare.style.top = (ry + rh/2) + 'px';
            flare.style.display = 'block';
            document.getElementById('cam-container').classList.add('haptic-shake');

            // AI LOGIC
            const aiCanvas = document.getElementById('canvas');
            const aiCtx = aiCanvas.getContext('2d');
            aiCtx.filter = 'contrast(1.5) grayscale(1)';
            aiCtx.drawImage(video, 0, 0, 224, 224);
            const blob = await new Promise(r => aiCanvas.toBlob(r, 'image/jpeg'));
            const url = URL.createObjectURL(blob);
            const image = await window.RawImage.fromURL(url);
            const inputs = await processor(image);
            const { last_hidden_state } = await model(inputs);
            const capturedVector = Array.from(last_hidden_state.mean(1).data);
            URL.revokeObjectURL(url);

            let results = inventoryData.map(item => {
                if (!item.vector) return { ...item, score: 0 };
                const dbVector = item.vector.split('|').map(Number);
                const score = cosineSimilarity(capturedVector, dbVector);
                return { ...item, score: score };
            });

            const filteredResults = results.filter(item => item.score >= 0.88);
            filteredResults.sort((a, b) => b.score - a.score);

            setTimeout(() => {
                flare.style.display = 'none';
                document.getElementById('cam-container').classList.remove('haptic-shake');
                document.getElementById('ai-hud').style.display = 'none';
                document.getElementById('lock-timer').style.display = 'none';
                ctx.clearRect(0, 0, holoCanvas.width, holoCanvas.height);
                renderList(filteredResults);
                if(filteredResults.length === 0) alert("Không tìm thấy mã hàng khớp (>88%)");
            }, 600);
        };

        function cosineSimilarity(vA, vB) {
            let dot = 0, mA = 0, mB = 0;
            const len = Math.min(vA.length, vB.length);
            for (let i = 0; i < len; i++) {
                dot += vA[i] * vB[i]; mA += vA[i] * vA[i]; mB += vB[i] * vB[i];
            }
            return (mA === 0 || mB === 0) ? 0 : dot / (Math.sqrt(mA) * Math.sqrt(mB));
        }

        window.renderList = (data) => {
            const listContainer = document.getElementById('product-list');
            document.getElementById('count-label').innerText = `${data.length} RECORDS`;
            listContainer.innerHTML = '';
            data.forEach(item => {
                const matchP = item.score ? (item.score * 100).toFixed(1) : 0;
                listContainer.innerHTML += `
                    <div class="flex items-center gap-5 p-4 bg-white border border-slate-50 rounded-[22px] hover:border-blue-400 hover:shadow-xl transition-all duration-500 group text-center">
                        <div class="w-16 h-16 rounded-2xl overflow-hidden bg-slate-100 cursor-zoom-in shadow-inner" onclick="openModal('${item.img}')">
                            <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-800 text-sm tracking-tight mb-1 font-mono italic">${item.code}</h4>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${item.id} • ${item.desc}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-blue-600 font-black block bg-blue-50 px-2 py-1 rounded-full mb-2 border border-blue-100 tracking-tighter">${matchP}% MATCH</span>
                            <button onclick="openModal('${item.img}')" class="w-9 h-9 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                                <i class="fas fa-expand-alt text-xs"></i>
                            </button>
                        </div>
                    </div>`;
            });
        }

        window.startCamera = async () => {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream; video.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('laser').style.display = 'block';
                document.getElementById('sys-status').innerText = "RADAR ACTIVE";
            } catch (err) { alert("Hãy cấp quyền Cam!"); }
        }

        window.openModal = (src) => { document.getElementById('zoom-img').src = src; document.getElementById('image-modal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        window.closeModal = () => { document.getElementById('image-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        initAI(); loadData();
    </script>
</body>
</html>
