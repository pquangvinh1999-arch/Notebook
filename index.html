<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#98ddca">
    <title>Sổ Tay Của Vợ ✨</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --mint-dark: #76c8b1; --mint-main: #98ddca; --mint-light: #d5ecc2; --pink-cute: #ffb7b2; --text-color: #555; --bg-color: #f7fbf9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 30px; box-shadow: 0 10px 25px rgba(152, 221, 202, 0.3); padding: 25px; display: flex; flex-direction: column; position: relative; }
        h2 { text-align: center; color: var(--mint-dark); font-size: 24px; margin-bottom: 20px; }
        .mic-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .btn-mic { background: var(--pink-cute); border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 35px; box-shadow: 0 8px 15px rgba(255, 183, 178, 0.4); cursor: pointer; }
        .listening { animation: pulse 1s infinite alternate; background: #ff9a93; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 14px; font-weight: bold; color: var(--mint-dark); display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border: 2px solid var(--mint-light); border-radius: 15px; font-size: 16px; outline: none; }
        .btn-save { background: var(--mint-main); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-test { background: #eee; color: #666; border: 1px solid #ccc; padding: 8px; width: 100%; border-radius: 10px; font-size: 13px; cursor: pointer; margin-bottom: 20px; }
        .task-list-title { margin-top: 20px; margin-bottom: 10px; font-size: 18px; color: var(--mint-dark); }
        ul { list-style: none; }
        li { background: var(--mint-light); margin-bottom: 10px; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 11px; padding: 2px 6px; border-radius: 10px; background: white; color: var(--mint-dark); }
        .btn-delete { background: white; color: var(--pink-cute); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .wake-lock-btn { margin-top: 20px; background: #f1f2f6; color: #a4b0be; padding: 10px; text-align: center; border-radius: 15px; font-size: 13px; cursor: pointer; }
        .wake-lock-btn.active { background: #ffeaa7; color: #d63031; }
        .battery-saver-btn { margin-top: 10px; background: #2f3640; color: white; padding: 10px; text-align: center; border-radius: 15px; font-size: 13px; cursor: pointer; }
        #blackScreen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; justify-content: center; align-items: center; color: #333; flex-direction: column; }
        #blackScreen.active { display: flex; }
        .status-text { text-align: center; font-size: 12px; color: var(--pink-cute); margin-bottom: 10px; height: 15px; }
    </style>
</head>
<body>

<div id="blackScreen">
    <div style="font-size: 40px;">⏳</div>
    <div style="color: #555; font-size: 12px; margin-top: 20px;">Chạm 2 lần để bật màn hình</div>
</div>

<div class="app-container">
    <h2>🌸 Sổ Tay Chồng Làm 🌸</h2>
    
    <div class="mic-container"><button id="btnMic" class="btn-mic">🎙️</button></div>
    <div id="micStatus" class="status-text">Chạm vào mic để nói!</div>
    
    <div class="input-group">
        <label>📝 Việc cần làm:</label>
        <input type="text" id="taskInput" placeholder="Ví dụ: Móc sợi...">
    </div>
    <div class="input-group">
        <label>⏰ Giờ nhắc:</label>
        <input type="time" id="timeInput">
    </div>
    
    <button id="btnSave" class="btn-save">Lưu Lại 💕</button>
    <button id="btnTest" class="btn-test">🔊 Thử tiếng (Test Loa)</button>

    <div class="task-list-title">✨ Danh sách:</div>
    <ul id="taskList"></ul>

    <div id="wakeLockBtn" class="wake-lock-btn">🌙 Bật chống tắt màn hình</div>
    <div id="batteryBtn" class="battery-saver-btn" style="display:none;">🔋 Tối ưu pin (Màn hình đen)</div>
</div>

<script>
    const btnMic = document.getElementById('btnMic');
    const micStatus = document.getElementById('micStatus');
    const taskInput = document.getElementById('taskInput');
    const timeInput = document.getElementById('timeInput');
    const btnSave = document.getElementById('btnSave');
    const taskList = document.getElementById('taskList');
    const wakeLockBtn = document.getElementById('wakeLockBtn');
    const batteryBtn = document.getElementById('batteryBtn');
    const blackScreen = document.getElementById('blackScreen');
    const btnTest = document.getElementById('btnTest');
    
    let tasks = JSON.parse(localStorage.getItem('cuteTasksV2')) || [];
    let isInitSpeech = false;

    // --- MỞ KHÓA LOA TRIỆT ĐỂ ---
    function unlockAudio() {
        if (!isInitSpeech) {
            window.speechSynthesis.cancel();
            let u = new SpeechSynthesisUtterance("");
            u.volume = 0;
            window.speechSynthesis.speak(u);
            isInitSpeech = true;
            console.log("Audio Unlocked");
        }
    }
    document.body.addEventListener('click', unlockAudio);
    document.body.addEventListener('touchstart', unlockAudio);

    // Nút Test loa
    btnTest.addEventListener('click', () => {
        speak("Loa hoạt động tốt rồi anh nhé!");
    });

    renderTasks();

    // --- Wake Lock ---
    let wakeLock = null;
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLockBtn.classList.add('active');
                wakeLockBtn.innerHTML = "☀️ Đang chống tắt màn hình";
                batteryBtn.style.display = "block";
                wakeLock.addEventListener('release', () => {
                    wakeLockBtn.classList.remove('active');
                    wakeLockBtn.innerHTML = "🌙 Bật chống tắt màn hình";
                    batteryBtn.style.display = "none";
                });
            }
        } catch (err) {}
    }
    wakeLockBtn.addEventListener('click', () => {
        if (!wakeLock) requestWakeLock();
        else wakeLock.release().then(() => wakeLock = null);
    });
    batteryBtn.addEventListener('click', () => blackScreen.classList.add('active'));
    blackScreen.addEventListener('dblclick', () => blackScreen.classList.remove('active'));

    // --- Mic ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN';
        btnMic.addEventListener('click', () => {
            recognition.start();
            btnMic.classList.add('listening');
            micStatus.textContent = "Anh đang nghe... 👂";
        });
        recognition.onresult = (event) => {
            taskInput.value = event.results[0][0].transcript;
            btnMic.classList.remove('listening');
            micStatus.textContent = "Xong rồi! Chọn giờ nhé 🥰";
        };
        recognition.onerror = () => {
            btnMic.classList.remove('listening');
            micStatus.textContent = "Thử lại nha!";
        }
    }

    // --- Save ---
    btnSave.addEventListener('click', () => {
        if (!taskInput.value || !timeInput.value) return alert("Nhập đủ thông tin nhé! 🥺");
        tasks.push({ id: Date.now(), text: taskInput.value, time: timeInput.value, reminded10: false, reminded5: false, remindedExact: false });
        saveTasks(); renderTasks();
        taskInput.value = ''; timeInput.value = '';
    });

    function renderTasks() {
        taskList.innerHTML = '';
        tasks.sort((a, b) => a.time.localeCompare(b.time)); 
        tasks.forEach(task => {
            let status = '<span class="status-badge">⏰ Chờ</span>';
            if (task.remindedExact) status = '<span class="status-badge" style="color:green">✔️ Xong</span>';
            else if (task.reminded5) status = '<span class="status-badge" style="color:orange">⏳ 5p</span>';
            else if (task.reminded10) status = '<span class="status-badge" style="color:red">⏳ 10p</span>';

            const li = document.createElement('li');
            li.innerHTML = `<div class="task-content"><span class="task-text">${task.text}</span><span class="task-time">🕒 ${task.time} ${status}</span></div><button class="btn-delete" onclick="deleteTask(${task.id})">❌</button>`;
            taskList.appendChild(li);
        });
    }

    window.deleteTask = (id) => { tasks = tasks.filter(t => t.id !== id); saveTasks(); renderTasks(); }
    function saveTasks() { localStorage.setItem('cuteTasksV2', JSON.stringify(tasks)); }

    function speak(text) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'vi-VN'; u.rate = 1.0; u.pitch = 1.2;
            window.speechSynthesis.speak(u);
        }, 100);
    }

    function getMinusTime(timeString, minutes) {
        const [h, m] = timeString.split(':');
        const d = new Date(); d.setHours(parseInt(h), parseInt(m), 0, 0);
        d.setMinutes(d.getMinutes() - minutes);
        return d.toTimeString().slice(0, 5);
    }

    setInterval(() => {
        const now = new Date().toTimeString().slice(0, 5);
        tasks.forEach(task => {
            const t10 = getMinusTime(task.time, 10);
            const t5 = getMinusTime(task.time, 5);

            if (now === t10 && !task.reminded10) {
                speak(`Còn 10 phút nữa: ${task.text}`);
                task.reminded10 = true; saveTasks(); renderTasks();
            }
            if (now === t5 && !task.reminded5) {
                speak(`Còn 5 phút nữa: ${task.text}`);
                task.reminded5 = true; saveTasks(); renderTasks();
            }
            if (now === task.time && !task.remindedExact) {
                speak(`Đã đến giờ: ${task.text}. Vợ làm việc tốt nhé!`);
                alert(`⏰ Đến giờ: ${task.text}`);
                if(blackScreen.classList.contains('active')) blackScreen.classList.remove('active');
                task.remindedExact = true; saveTasks(); renderTasks();
            }
        });
    }, 1000);

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
